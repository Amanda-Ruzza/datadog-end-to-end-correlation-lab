<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<head>
    <title>Sign in — Classic Jazz</title>
</head>
<body>
<th:block th:fragment="content">
<section class="auth-page">
    <h1>Sign in / Sign up</h1>
    <div class="auth-forms">
        <div class="auth-box">
            <h2>Sign in</h2>
            <form th:action="@{/auth/signin}" method="post" class="auth-form">
                <label for="signin-email">Email</label>
                <input type="email" id="signin-email" name="email" required/>
                <button type="submit" class="btn btn-primary">Sign in</button>
            </form>
        </div>
        <div class="auth-box">
            <h2>Sign up</h2>
            <form th:action="@{/auth/signup}" method="post" class="auth-form">
                <label for="signup-first">First name</label>
                <input type="text" id="signup-first" name="firstName" required/>
                <label for="signup-last">Last name</label>
                <input type="text" id="signup-last" name="lastName" required/>
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" name="email" required/>
                <button type="submit" class="btn btn-primary">Sign up</button>
            </form>
        </div>
    </div>
</section>
</th:block>
</body>
</html>
