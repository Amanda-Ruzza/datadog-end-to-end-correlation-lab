<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Something went wrong — Classic Jazz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/classic-jazz.css}"/>
</head>
<body>
    <header class="site-header">
        <a th:href="@{/}" class="logo">Classic Jazz</a>
        <nav>
            <a th:href="@{/}">Catalog</a>
            <a th:href="@{/cart}">Cart</a>
            <a th:href="@{/auth}">Sign in</a>
        </nav>
    </header>
    <main class="main-content">
        <section class="error-page">
            <h1>Something went wrong</h1>
            <p class="error-message">We couldn't complete your request. Please try again or go back to the catalog.</p>
            <p th:if="${message}" class="error-detail" th:text="${#strings.abbreviate(message, 200)}">Optional technical message</p>
            <p class="error-actions">
                <a th:href="@{/}" class="btn btn-primary">Back to catalog</a>
                <a th:href="@{/cart}" class="btn">View cart</a>
            </p>
        </section>
    </main>
    <footer class="site-footer">
        <p>Classic Jazz — vinyl for the soul.</p>
    </footer>
</body>
</html>
