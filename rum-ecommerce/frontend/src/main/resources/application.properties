server.port=8080
# Backend API URL: use http://backend:8000 when running in Docker Compose
backend.url=${BACKEND_URL:http://localhost:8000}

# Session cookie: ensure it is sent on redirect after POST (e.g. add-to-cart -> /cart)
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true

# User context file for RUM/session tracking (e.g. Datadog RUM SDK). Written on signup/signin/checkout; cleared on signout.
# In Docker Compose, set CLASSICJAZZ_USER_CONTEXT_FILE=/app/data/user_context.json so the file lives in the mounted volume.
classicjazz.user-context.file=${CLASSICJAZZ_USER_CONTEXT_FILE:user_context.json}
